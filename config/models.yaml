# 任务类型定义
task_types:
  - name: "代码生成"
    subtypes:
      - "简单": "单个函数/类，< 100 行"
      - "中等": "完整功能模块，100-500 行"
      - "复杂": "多模块系统，> 500 行"
    base_tokens:
      min: 200
      avg: 800
      max: 2000
      
  - name: "代码审查"
    subtypes:
      - "简单": "< 100 行"
      - "中等": "100-500 行"
      - "复杂": "> 500 行"
    base_tokens:
      min: 300
      avg: 800
      max: 1500
      
  - name: "文案写作"
    subtypes:
      - "短": "< 500 字"
      - "中": "500-2000 字"
      - "长": "> 2000 字"
    base_tokens:
      min: 100
      avg: 500
      max: 2000
      
  - name: "搜索研究"
    subtypes:
      - "简单": "单一问题"
      - "中等": "多源对比"
      - "复杂": "深度研究"
    base_tokens:
      min: 200
      avg: 800
      max: 2000
      
  - name: "数据分析"
    subtypes:
      - "简单": "基础统计"
      - "中等": "多维度分析"
      - "复杂": "建模预测"
    base_tokens:
      min: 500
      avg: 1500
      max: 4000
      
  - name: "AI 绘画"
    subtypes:
      - "简单": "基础提示词"
      - "中等": "详细提示词"
      - "复杂": "多轮迭代"
    base_tokens:
      min: 50
      avg: 150
      max: 300
